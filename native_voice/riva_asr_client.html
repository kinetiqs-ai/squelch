<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Squelch Native Riva ASR</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #101215;
        color: #f2f2ec;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #101215;
      }

      main {
        box-sizing: border-box;
        width: min(980px, 100%);
        margin: 0 auto;
        padding: 32px 20px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        font-weight: 650;
      }

      .status {
        display: inline-flex;
        align-items: center;
        min-height: 36px;
        padding: 0 12px;
        border: 1px solid #3d424a;
        border-radius: 6px;
        color: #cfd4dc;
        background: #181b20;
        font-size: 14px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
      }

      button {
        min-width: 116px;
        min-height: 42px;
        border: 1px solid transparent;
        border-radius: 6px;
        background: #e3b341;
        color: #17140a;
        font: inherit;
        font-weight: 650;
        cursor: pointer;
      }

      button.secondary {
        background: transparent;
        color: #f2f2ec;
        border-color: #4a5059;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.48;
      }

      .meter {
        position: relative;
        flex: 1 1 220px;
        height: 12px;
        overflow: hidden;
        border-radius: 999px;
        background: #242932;
      }

      .meter span {
        display: block;
        width: 0%;
        height: 100%;
        background: #56c2a4;
      }

      .panel {
        min-height: 420px;
        margin-bottom: 16px;
        border: 1px solid #343a43;
        border-radius: 8px;
        background: #15181d;
      }

      .panel.compact {
        min-height: 120px;
      }

      .panel.log {
        min-height: 180px;
        max-height: 260px;
        overflow: auto;
      }

      .line {
        padding: 14px 16px;
        border-bottom: 1px solid #282d35;
        color: #d8dde4;
        font-size: 18px;
        line-height: 1.45;
      }

      .line.final {
        color: #ffffff;
        background: #1b1f25;
      }

      .line.meta {
        color: #8e98a7;
        font-size: 13px;
      }

      .line.interim {
        color: #cfd4dc;
        background: #161b22;
      }

      .line.empty {
        color: #6f7885;
      }

      .event {
        padding: 8px 12px;
        border-bottom: 1px solid #282d35;
        color: #aeb7c4;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        line-height: 1.35;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      .event.final {
        color: #ffffff;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Native Riva ASR</h1>
        <div class="status" id="status">idle</div>
      </header>

      <div class="controls">
        <button id="start">Start</button>
        <button id="stop" class="secondary" disabled>Stop</button>
        <div class="meter" aria-hidden="true"><span id="level"></span></div>
      </div>

      <section class="panel compact" id="committed">
        <div class="line meta">Committed final transcript</div>
        <div class="line empty" id="committedText">No final segments yet.</div>
      </section>

      <section class="panel compact" id="interim">
        <div class="line meta">Active interim</div>
        <div class="line empty" id="interimText">No active interim.</div>
      </section>

      <section class="panel log" id="events">
        <div class="event">Raw Riva events will appear here.</div>
      </section>
    </main>

    <script>
      const startButton = document.getElementById("start");
      const stopButton = document.getElementById("stop");
      const statusEl = document.getElementById("status");
      const committedText = document.getElementById("committedText");
      const interimText = document.getElementById("interimText");
      const events = document.getElementById("events");
      const levelEl = document.getElementById("level");

      let audioContext;
      let mediaStream;
      let processor;
      let source;
      let socket;
      let carry = new Float32Array(0);

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function renderTranscript(message) {
        committedText.textContent = message.committed_text || "No final segments yet.";
        committedText.className = message.committed_text ? "line final" : "line empty";
        interimText.textContent = message.active_interim || "No active interim.";
        interimText.className = message.active_interim ? "line interim" : "line empty";
      }

      function appendEvent(message) {
        const line = document.createElement("div");
        line.className = message.final ? "event final" : "event";
        line.textContent =
          `${String(message.sequence).padStart(3, "0")} ` +
          `${message.final ? "FINAL  " : "INTERIM"} ` +
          `${message.elapsed_ms}ms | ${message.text}`;
        events.appendChild(line);
        events.scrollTop = events.scrollHeight;
      }

      function downsampleTo16k(input, sampleRate) {
        if (sampleRate === 16000) return input;
        const ratio = sampleRate / 16000;
        const outputLength = Math.floor(input.length / ratio);
        const output = new Float32Array(outputLength);
        for (let i = 0; i < outputLength; i += 1) {
          const start = Math.floor(i * ratio);
          const end = Math.floor((i + 1) * ratio);
          let sum = 0;
          let count = 0;
          for (let j = start; j < end && j < input.length; j += 1) {
            sum += input[j];
            count += 1;
          }
          output[i] = count ? sum / count : 0;
        }
        return output;
      }

      function floatToInt16Bytes(input) {
        const buffer = new ArrayBuffer(input.length * 2);
        const view = new DataView(buffer);
        for (let i = 0; i < input.length; i += 1) {
          const sample = Math.max(-1, Math.min(1, input[i]));
          view.setInt16(i * 2, sample < 0 ? sample * 0x8000 : sample * 0x7fff, true);
        }
        return buffer;
      }

      function concatFloat32(a, b) {
        const out = new Float32Array(a.length + b.length);
        out.set(a, 0);
        out.set(b, a.length);
        return out;
      }

      function processAudio(event) {
        if (!socket || socket.readyState !== WebSocket.OPEN) return;
        const channel = event.inputBuffer.getChannelData(0);
        let peak = 0;
        for (let i = 0; i < channel.length; i += 1) peak = Math.max(peak, Math.abs(channel[i]));
        levelEl.style.width = `${Math.min(100, Math.round(peak * 180))}%`;

        carry = concatFloat32(carry, downsampleTo16k(channel, audioContext.sampleRate));
        const frameSize = 1600;
        while (carry.length >= frameSize) {
          const frame = carry.slice(0, frameSize);
          carry = carry.slice(frameSize);
          socket.send(floatToInt16Bytes(frame));
        }
      }

      async function start() {
        startButton.disabled = true;
        setStatus("requesting mic");
        mediaStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            channelCount: 1,
            echoCancellation: false,
            noiseSuppression: false,
            autoGainControl: false,
          },
        });

        const wsScheme = window.location.protocol === "https:" ? "wss" : "ws";
        socket = new WebSocket(`${wsScheme}://${window.location.host}/ws/asr`);
        socket.binaryType = "arraybuffer";

        socket.onopen = async () => {
          audioContext = new AudioContext();
          source = audioContext.createMediaStreamSource(mediaStream);
          processor = audioContext.createScriptProcessor(4096, 1, 1);
          processor.onaudioprocess = processAudio;
          source.connect(processor);
          processor.connect(audioContext.destination);
          stopButton.disabled = false;
          setStatus(`streaming ${audioContext.sampleRate} Hz -> 16 kHz`);
        };

        socket.onmessage = (event) => {
          const message = JSON.parse(event.data);
          if (message.type === "ready") return;
          if (message.type === "transcript") {
            renderTranscript(message);
            appendEvent(message);
            setStatus(message.final ? `final ${message.elapsed_ms} ms` : `interim ${message.elapsed_ms} ms`);
            return;
          }
          setStatus(message.message || message.type);
        };

        socket.onclose = () => {
          setStatus("closed");
          startButton.disabled = false;
          stopButton.disabled = true;
        };
      }

      async function stop() {
        stopButton.disabled = true;
        if (socket && socket.readyState === WebSocket.OPEN) {
          socket.send(JSON.stringify({ type: "stop" }));
          socket.close();
        }
        if (processor) processor.disconnect();
        if (source) source.disconnect();
        if (audioContext) await audioContext.close();
        if (mediaStream) mediaStream.getTracks().forEach((track) => track.stop());
        levelEl.style.width = "0%";
        setStatus("stopped");
        startButton.disabled = false;
      }

      startButton.addEventListener("click", () => start().catch((error) => {
        setStatus(error.message);
        startButton.disabled = false;
      }));
      stopButton.addEventListener("click", () => stop());
    </script>
  </body>
</html>
